<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点赞页面</title>
    <link rel="stylesheet" href="like_style.css">
</head>
<body>

        <h1>点赞功能演示</h1>

        </div>
    </div>
    <script src="like_script.js"></script>

</html>
